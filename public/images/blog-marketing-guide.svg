<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#ECFDF5"/>
  <!-- Megaphone -->
  <rect x="140" y="160" width="80" height="100" rx="15" fill="#10B981" stroke="#1C1917" stroke-width="4"/>
  <path d="M220 180 l60 -20 l0 80 l-60 -20" fill="#34D399" stroke="#1C1917" stroke-width="4"/>
  <path d="M260 210 l40 15 l0 30 l-40 15" fill="#10B981" stroke="#1C1917" stroke-width="3"/>
  <!-- Sound waves -->
  <path d="M310 200 q20 -15 20 -25 q0 -10 -20 -15" fill="none" stroke="#1C1917" stroke-width="3"/>
  <path d="M325 190 q25 -20 25 -30 q0 -10 -25 -20" fill="none" stroke="#1C1917" stroke-width="2"/>
  <!-- Social icons -->
  <rect x="420" y="100" width="60" height="60" rx="15" fill="#1C1917"/>
  <text x="450" y="138" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">IG</text>
  <rect x="510" y="100" width="60" height="60" rx="15" fill="#1C1917"/>
  <text x="540" y="138" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">WA</text>
  <rect x="600" y="100" width="60" height="60" rx="15" fill="#1C1917"/>
  <text x="630" y="138" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">YT</text>
  <!-- Growth arrow -->
  <path d="M400 360 l50 -60 l30 20 l60 -80 l30 20 l60 -50" fill="none" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
  <!-- Stars/reach indicators -->
  <circle cx="450" cy="380" r="8" fill="#FCD34D" stroke="#1C1917" stroke-width="2"/>
  <circle cx="540" cy="380" r="8" fill="#FCD34D" stroke="#1C1917" stroke-width="2"/>
  <circle cx="630" cy="380" r="8" fill="#FCD34D" stroke="#1C1917" stroke-width="2"/>
  <!-- Stats boxes -->
  <rect x="420" y="270" width="90" height="40" rx="8" fill="white" stroke="#1C1917" stroke-width="2"/>
  <text x="465" y="295" text-anchor="middle" font-family="monospace" font-size="14" fill="#1C1917" font-weight="bold">4.5x ROI</text>
  <rect x="530" y="270" width="100" height="40" rx="8" fill="white" stroke="#1C1917" stroke-width="2"/>
  <text x="580" y="295" text-anchor="middle" font-family="monospace" font-size="14" fill="#1C1917" font-weight="bold">2.1M REACH</text>
</svg>