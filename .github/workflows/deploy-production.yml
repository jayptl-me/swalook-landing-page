name: Deploy Production - swalook-landing-page

on:
  push:
    branches: ['**']  # TEMP: all branches for CI validation — revert to [main] when done
  workflow_dispatch:

concurrency:
  group: ci-deploy-production
  cancel-in-progress: false

jobs:
  validate-before-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run build
        env:
          NODE_ENV: production
      - run: bun run test
        env:
          NODE_ENV: test
      - name: Security scan
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace aquasec/trivy:0.60.0 \
            filesystem --scanners vuln,secret,misconfig --severity CRITICAL,HIGH --exit-code 1 /workspace
      - name: Dependency audit
        run: bun audit 2>&1
        shell: bash

  deploy:
    needs: [validate-before-deploy]
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" || echo "WARN: No RENDER_DEPLOY_HOOK_URL configured — manual deploy required"

  post-deploy-smoke:
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test production
        run: bash .github/scripts/smoke-test.sh "https://swalook-landing-page.onrender.com"
