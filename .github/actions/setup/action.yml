name: Setup swalook-landing-page
description: Checkout, setup Bun, cache node_modules, install dependencies

inputs:
  bun-version:
    description: Bun version to install
    required: false
    default: "latest"

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}
    - uses: actions/cache@v4
      with:
        path: node_modules
        key: node-${{ hashFiles('bun.lock') }}
        restore-keys: node-
    - run: bun install --frozen-lockfile
      shell: bash
