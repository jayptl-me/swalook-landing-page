name: Promote Staging - swalook-landing-page

on:
  push:
    branches: [staging]

concurrency:
  group: ci-promote-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run build
      - run: bun run test
        env:
          NODE_ENV: test
      - name: Validate env configuration
        run: |-
          if [ -f .env.example ]; then
            grep -o '^[A-Z_]*=' .env.example | sort
          fi
        shell: bash

  create-promotion-pr:
    runs-on: ubuntu-latest
    needs: [integration]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          EXISTS=$(gh pr list --repo ${{ github.repository }} --head staging --base main --json id --jq 'length')
          if [ "$EXISTS" -eq 0 ]; then
            gh pr create --repo ${{ github.repository }} \
              --title "chore: promote staging to main ($(date +'%Y-%m-%d'))" \
              --body "Auto-promotion: staging to main. Validated by integration checks. PR created same-day after staging push. Merge happens Monday 9PM IST via weekly-release cron (release-weekly.yml)." \
              --base main --head staging \
              --label auto-promotion,promotion:staging-to-main || echo "PR create skipped"
          fi
        shell: bash
