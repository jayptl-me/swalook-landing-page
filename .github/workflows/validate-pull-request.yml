name: Validate PR - swalook-landing-page

on:
  pull_request:
    branches: [live-testing]
    types: [opened, synchronize, reopened]
  push:
    branches: [live-testing]
  workflow_dispatch:

concurrency:
  group: ci-validate-${{ github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_REPORT: coverage/lcov.info

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old workflow runs (keep last 20)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Keeping the 20 most recent workflow runs..."
          ids=$(gh run list --limit 30 --json databaseId --jq '.[].databaseId' 2>/dev/null | tail -n +21 || true)
          for id in $ids; do
            gh run delete "$id" 2>/dev/null || true
          done
        shell: bash

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run test
        env:
          JWT_SECRET: test-jwt-secret-32-chars-minimum-req
          JWT_EXPIRES_IN: 7d
          NODE_ENV: test
          LOG_LEVEL: error

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        continue-on-error: true

      - name: Bun audit (dependency vulnerabilities)
        run: bun audit 2>&1 || true
        shell: bash

      - name: Trivy vulnerability & secret scan (open source)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            aquasec/trivy:latest \
            filesystem --scanners vuln,secret,misconfig \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            /workspace
        shell: bash

      - name: Gitleaks secret scan (open source, no token needed)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/path \
            zricethezav/gitleaks:latest \
            detect --source=/path --no-git -v
        shell: bash

  quality-and-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check console.log statements
        run: |-
          COUNT=$(grep -rn 'console\.log' --include='*.js' --include='*.jsx' . 2>/dev/null | grep -v node_modules | grep -v .next | grep -v .test | wc -l) || true
          echo "console.log count: $COUNT"
        shell: bash
      - name: Check for secrets in source
        run: |-
          RESULTS=$(grep -rn 'password.*secret.*key.*token' --include='*.js' --include='*.jsx' . 2>/dev/null | grep -v '.env' | grep -v 'process.env' | wc -l) || true
          echo "Potential secrets: $RESULTS"
        shell: bash
      - name: Validate config files
        run: |-
          for f in render.yaml .env.example; do
            [ -f "$f" ] && echo "$f present" || echo "$f MISSING"
          done
        shell: bash

  promote-to-staging:
    if: github.event_name == 'push' && github.ref_name == 'live-testing'
    needs: [lint, typecheck, test, build, security-scan, quality-and-config]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          EXISTS=$(gh pr list --head live-testing --base staging --json id --jq 'length')
          if [ "$EXISTS" -eq 0 ]; then
            gh pr create \
              --title "chore: promote live-testing to staging ($(date +'%Y-%m-%d'))" \
              --body "Auto-promotion: live-testing to staging. Validated by validate-pull-request.yml (lint, typecheck, test, build, security-scan). All checks passed. PR created same-day. Merge happens when staging validates." \
              --base staging --head live-testing \
              --label auto-promotion,promotion:live-testing-to-staging
          fi
        shell: bash
