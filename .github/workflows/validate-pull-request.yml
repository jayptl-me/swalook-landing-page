name: Validate PR - swalook-landing-page

on:
  pull_request:
    branches: [main, live-testing]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, live-testing, staging, dj**]
  workflow_dispatch:

concurrency:
  group: ci-validate-${{ github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_REPORT: coverage/lcov.info

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run test -- --coverage
        env:
          NODE_ENV: test
      - name: Verify coverage report
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "Coverage report generated successfully"
          else
            echo "FAIL: No coverage report found — coverage thresholds not met or tests failed"
            exit 1
          fi
        shell: bash

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Bun audit (fail on critical/high)
        run: |
          set +e
          OUTPUT=$(bun audit 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"
          REAL_HIGH=$(echo "$OUTPUT" | grep -E -i "high:|critical:" | wc -l || echo "0")
          if [ "$REAL_HIGH" -gt 0 ] 2>/dev/null; then
            echo "FAIL: Found $REAL_HIGH HIGH/CRITICAL vulnerability(ies)"
            exit 1
          fi
          echo "OK: No HIGH/CRITICAL vulnerabilities"
        shell: bash

      - name: Osv-scanner vulnerability scan
        run: |
          npm install -g @google/osv-scanner
          osv-scanner --recursive .
        shell: bash

      - name: Trivy vulnerability & secret scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            aquasec/trivy:0.60.0 \
            filesystem --scanners vuln,secret,misconfig \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            /workspace
        shell: bash

      - name: Gitleaks secret scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/path \
            zricethezav/gitleaks:latest \
            detect --source=/path --no-git -v
        shell: bash

  quality-and-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check console.log statements
        run: |-
          set +e
          FILES=$(grep -rn 'console\.log' --include='*.js' --include='*.jsx' . 2>/dev/null | grep -v node_modules | grep -v .next | grep -v .test. || true)
          COUNT=$(echo "$FILES" | grep -c . || echo "0")
          echo "console.log count: $COUNT"
          if [ "$COUNT" -gt 5 ]; then
            echo "FAIL: Found $COUNT console.log statements — use a proper logger instead"
            echo "$FILES"
            exit 1
          fi
        shell: bash
      - name: Check for secrets in source
        run: |-
          set +e
          RESULTS=$(grep -rn 'password.*secret.*key.*token' --include='*.js' --include='*.jsx' . 2>/dev/null | grep -v '.env' | grep -v 'process.env' | grep -v node_modules | wc -l || true)
          echo "Potential secrets: $RESULTS"
          if [ "$RESULTS" -gt 0 ]; then
            echo "FAIL: Found $RESULTS potential secrets in source code"
            exit 1
          fi
        shell: bash
      - name: Validate config files
        run: |-
          set +e
          FAIL=0
          for f in render.yaml .env.example; do
            if [ -f "$f" ]; then
              echo "$f present"
            else
              echo "FAIL: $f MISSING"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
        shell: bash

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Check for E2E tests
        run: |
          COUNT=$(find e2e -name '*.spec.*' -o -name '*.test.*' 2>/dev/null | wc -l)
          if [ "$COUNT" -lt 1 ]; then
            echo "FAIL: No E2E tests found in e2e/"
            exit 1
          fi
          echo "Found $COUNT E2E test files"
        shell: bash

  promote-to-staging:
    if: github.event_name == 'push' && github.ref_name == 'live-testing'
    needs: [lint, typecheck, test, build, security-scan, quality-and-config, e2e-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          EXISTS=$(gh pr list --repo ${{ github.repository }} --head live-testing --base staging --json id --jq 'length' 2>/dev/null || echo "0")
          if [ "$EXISTS" -eq 0 ]; then
            gh pr create --repo ${{ github.repository }} \
              --title "chore: promote live-testing to staging ($(date +'%Y-%m-%d'))" \
              --body "Auto-promotion: live-testing to staging. Validated by validate-pull-request.yml (lint, typecheck, test, build, security-scan, quality-and-config, e2e-tests). All checks passed." \
              --base staging --head live-testing \
              --label auto-promotion,promotion:live-testing-to-staging
          else
            echo "PR already exists - skipping creation"
          fi
        shell: bash
