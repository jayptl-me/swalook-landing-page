<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00BCD4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00BCD4"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)" rx="16"/>
  <rect x="60" y="60" width="680" height="380" rx="24" fill="none" stroke="rgba(0,188,212,0.2)" stroke-width="2"/>
  
  <!-- Central hub -->
  <circle cx="400" cy="220" r="55" fill="url(#cyanGrad)" opacity="0.15"/>
  <circle cx="400" cy="220" r="40" fill="url(#cyanGrad)" opacity="0.25"/>
  <circle cx="400" cy="220" r="25" fill="url(#cyanGrad)" opacity="0.9"/>
  <text x="400" y="226" text-anchor="middle" fill="white" font-size="12" font-weight="700">CRM</text>
  
  <!-- Channel nodes around hub -->
  <!-- SMS -->
  <rect x="140" y="100" width="130" height="50" rx="12" fill="white" stroke="#00BCD4" stroke-width="2"/>
  <text x="205" y="130" text-anchor="middle" fill="#00BCD4" font-size="13" font-weight="700">SMS</text>
  <text x="205" y="143" text-anchor="middle" fill="#546E7A" font-size="9">98% open rate</text>
  <line x1="270" y1="125" x2="360" y2="200" stroke="rgba(0,188,212,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
  
  <!-- WhatsApp -->
  <rect x="140" y="270" width="130" height="50" rx="12" fill="white" stroke="#25D366" stroke-width="2"/>
  <text x="205" y="300" text-anchor="middle" fill="#25D366" font-size="13" font-weight="700">WhatsApp</text>
  <text x="205" y="313" text-anchor="middle" fill="#546E7A" font-size="9">500M+ users</text>
  <line x1="270" y1="295" x2="360" y2="240" stroke="rgba(37,211,102,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
  
  <!-- Email -->
  <rect x="530" y="100" width="130" height="50" rx="12" fill="white" stroke="#6C63FF" stroke-width="2"/>
  <text x="595" y="130" text-anchor="middle" fill="#6C63FF" font-size="13" font-weight="700">Email</text>
  <text x="595" y="143" text-anchor="middle" fill="#546E7A" font-size="9">Newsletters</text>
  <line x1="530" y1="125" x2="440" y2="200" stroke="rgba(108,99,255,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
  
  <!-- In-App -->
  <rect x="530" y="270" width="130" height="50" rx="12" fill="white" stroke="#FF6584" stroke-width="2"/>
  <text x="595" y="300" text-anchor="middle" fill="#FF6584" font-size="13" font-weight="700">In-App</text>
  <text x="595" y="313" text-anchor="middle" fill="#546E7A" font-size="9">Notifications</text>
  <line x1="530" y1="295" x2="440" y2="240" stroke="rgba(255,101,132,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
  
  <!-- Result banner -->
  <rect x="140" y="360" width="520" height="50" rx="12" fill="rgba(0,188,212,0.1)"/>
  <text x="400" y="390" text-anchor="middle" fill="#0097A7" font-size="16" font-weight="700">3x Higher Engagement · Coordinated Campaigns · Unified Analytics</text>
</svg>