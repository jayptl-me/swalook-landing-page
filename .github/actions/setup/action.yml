name: Setup swalook-landing-page
description: Checkout, setup Bun, cache node_modules, install dependencies

inputs:
  bun-version:
    description: Bun version to install
    required: false
    default: "1.3.4"

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}
    - uses: actions/cache/restore@v4
      id: cache-restore
      with:
        path: node_modules
        key: node-${{ hashFiles('bun.lock') }}-${{ github.ref_name }}
        restore-keys: |
          node-${{ hashFiles('bun.lock') }}-
          node-
    - name: Save cache (base branches only)
      if: github.ref_name == 'main' || github.ref_name == 'staging' || github.ref_name == 'live-testing'
      uses: actions/cache/save@v4
      with:
        path: node_modules
        key: node-${{ hashFiles('bun.lock') }}-${{ github.ref_name }}
    - run: bun install --frozen-lockfile
      shell: bash
