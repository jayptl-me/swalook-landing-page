name: Validate PR - swalook-landing-page

on:
  pull_request:
    branches: [main, live-testing]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, live-testing, staging]
  workflow_dispatch:

concurrency:
  group: ci-validate-${{ github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_REPORT: coverage/lcov.info

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete workflow runs older than 7 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SEVEN_DAYS_AGO=$(date -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -v-7d +%Y-%m-%dT%H:%M:%SZ 2>/dev/null)
          if [ -z "$SEVEN_DAYS_AGO" ]; then
            echo "Cannot compute date -- skipping cleanup"
            exit 0
          fi
          echo "Deleting runs older than $SEVEN_DAYS_AGO"
          gh run list --repo ${{ github.repository }} --limit 200 \
            --json databaseId,createdAt \
            --jq '.[] | select(.createdAt < "$SEVEN_DAYS_AGO") | .databaseId' | \
          while read id; do
            if [ -n "$id" ]; then
              gh run delete "$id" --repo ${{ github.repository }} 2>/dev/null || true
            fi
          done
        shell: bash

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run test
        env:
          JWT_SECRET: test-jwt-secret-32-chars-minimum-req
          JWT_EXPIRES_IN: 7d
          NODE_ENV: test
          LOG_LEVEL: error

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Dependency Review
        continue-on-error: true
        uses: actions/dependency-review-action@v4

      - name: Bun audit (dependency vulnerabilities)
        run: bun audit --audit-level high
        shell: bash

      - name: Trivy vulnerability & secret scan (open source)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            aquasec/trivy:0.60.0 \
            filesystem --scanners vuln,secret,misconfig \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            /workspace
        shell: bash

      - name: Gitleaks secret scan (open source, no token needed)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/path \
            zricethezav/gitleaks:latest \
            detect --source=/path --no-git -v
        shell: bash

  quality-and-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check console.log statements
        run: |-
          COUNT=$(grep -rn 'console\.log' || true --include='*.js' --include='*.jsx' . 2>/dev/null | grep -v node_modules | grep -v .next | grep -v .test | wc -l || true)
          echo "console.log count: $COUNT"
          exit 0
        shell: bash
      - name: Check for secrets in source
        run: |-
          RESULTS=$(grep -rn 'password.*secret.*key.*token' || true --include='*.js' --include='*.jsx' . 2>/dev/null | grep -v '.env' | grep -v 'process.env' | wc -l || true)
          echo "Potential secrets: $RESULTS"
          exit 0
        shell: bash
      - name: Validate config files
        run: |-
          for f in render.yaml .env.example; do
            [ -f "$f" ] && echo "$f present" || echo "$f MISSING"
          done
          exit 0
        shell: bash

  promote-to-staging:
    if: github.event_name == 'push' && github.ref_name == 'live-testing'
    needs: [lint, typecheck, test, build, security-scan, quality-and-config]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          EXISTS=$(gh pr list --repo ${{ github.repository }} --head live-testing --base staging --json id --jq 'length' 2>/dev/null || echo "0")
          if [ "$EXISTS" -eq 0 ]; then
            gh pr create --repo ${{ github.repository }} \
              --title "chore: promote live-testing to staging ($(date +'%Y-%m-%d'))" \
              --body "Auto-promotion: live-testing to staging. Validated by validate-pull-request.yml (lint, typecheck, test, build, security-scan). All checks passed. PR created same-day. Merge happens when staging validates." \
              --base staging --head live-testing \
              --label auto-promotion,promotion:live-testing-to-staging
          else
            echo "PR already exists - skipping creation"
          fi
        shell: bash
