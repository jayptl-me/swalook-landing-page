<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#FFF7ED"/>
  <!-- Background pattern -->
  <circle cx="100" cy="100" r="150" fill="#FED7AA" opacity="0.3"/>
  <circle cx="650" cy="350" r="180" fill="#FED7AA" opacity="0.2"/>
  <!-- Calendar icon with X mark -->
  <rect x="180" y="120" width="180" height="210" rx="20" fill="#F97316" stroke="#1C1917" stroke-width="4"/>
  <rect x="190" y="100" width="160" height="40" rx="8" fill="#1C1917"/>
  <rect x="210" y="240" width="120" height="8" rx="4" fill="#1C1917" opacity="0.4"/>
  <rect x="210" y="260" width="100" height="8" rx="4" fill="#1C1917" opacity="0.4"/>
  <!-- Big X mark over calendar -->
  <line x1="220" y1="160" x2="320" y2="200" stroke="#DC2626" stroke-width="12" stroke-linecap="round"/>
  <line x1="320" y1="160" x2="220" y2="200" stroke="#DC2626" stroke-width="12" stroke-linecap="round"/>
  <!-- Phone reminder icon -->
  <rect x="440" y="100" width="140" height="220" rx="20" fill="#1C1917"/>
  <circle cx="510" cy="270" r="15" fill="#10B981"/>
  <path d="M500 270 l8 8 l16 -16" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Stats -->
  <rect x="420" y="340" width="180" height="60" rx="12" fill="#F97316" stroke="#1C1917" stroke-width="3"/>
  <text x="510" y="378" text-anchor="middle" font-family="Arial Black" font-size="14" fill="white" font-weight="bold">-75% NO-SHOWS</text>
  <!-- Caption area -->
  <rect x="100" y="390" width="600" height="4" rx="2" fill="#1C1917" opacity="0.2"/>
</svg>